<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rankblox Doors Game</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    #elevatorPanel {
      margin-top: 20px;
      padding: 15px;
      border: 2px solid white;
      display: none;
      background: #222;
    }

    #switches button {
      display: inline-block;
      width: 80px;
      margin: 5px;
    }
  </style>
</head>
<body>

  <h1>🚪 Rankblox Doors</h1>

  <!-- GAME INFO -->
  <p id="door">🚪 Door 1</p>
  <p id="health">❤️ 100</p>
  <p id="status">🚪 Exploring...</p>

  <!-- MAIN BUTTON -->
  <button id="openDoorBtn">Open Door</button>

  <hr>

  <!-- 🛗 ELEVATOR PUZZLE PANEL -->
  <div id="elevatorPanel">
    <h2>🛗 Elevator Power System</h2>

    <p id="elevatorInstruction">
      Turn ON switches...
    </p>

    <div id="switches"></div>

    <br>

    <button id="confirmBtn">Confirm</button>
  </div>

  <!-- LINK TO YOUR SCRIPT -->
  <script src="game.js"></script>

</body>
</html>
